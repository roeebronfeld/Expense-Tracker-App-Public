<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/expense-tracker-mark.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <title>Expense Tracker</title>
    <meta name="description" content="Full-stack expense tracking application" />
    <meta property="og:title" content="Expense Tracker" />
    <meta property="og:description" content="Track expenses, set budgets, and understand your spending" />
    <meta property="og:type" content="website" />
    <script>
      (() => {
        const savedTheme = localStorage.getItem("theme-preference");
        const prefersDark = savedTheme !== "light";
        document.documentElement.classList.toggle("dark", prefersDark);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
