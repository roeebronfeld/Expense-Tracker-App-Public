name: CI

on:
  push:
    branches: [main, feature/**]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "123456789012"
  ECR_BACKEND_REPO: expense-tracker-backend
  ECR_FRONTEND_REPO: expense-tracker-frontend
  AWS_ROLE_ARN: arn:aws:iam::123456789012:role/expense-tracker-prod-github-actions-role

jobs:
  backend-checks:
    name: Backend - Lint & Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: app/backend/dist/
          retention-days: 7

  frontend-checks:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist/
          retention-days: 7

  docker-build:
    name: Docker - Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: github-actions-ci-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS identity
        run: aws sts get-caller-identity
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          ECR_REGISTRY="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          BACKEND="${ECR_REGISTRY}/${{ env.ECR_BACKEND_REPO }}"
          FRONTEND="${ECR_REGISTRY}/${{ env.ECR_FRONTEND_REPO }}"

          # Base tags: latest, full SHA, short SHA
          BACKEND_TAGS="${BACKEND}:latest,${BACKEND}:${{ github.sha }},${BACKEND}:${SHORT_SHA}"
          FRONTEND_TAGS="${FRONTEND}:latest,${FRONTEND}:${{ github.sha }},${FRONTEND}:${SHORT_SHA}"

          # If this is a version tag push, also tag with the version (e.g. v1.0.0)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
            BACKEND_TAGS="${BACKEND_TAGS},${BACKEND}:${VERSION_TAG}"
            FRONTEND_TAGS="${FRONTEND_TAGS},${FRONTEND}:${VERSION_TAG}"
            echo "image_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

          echo "backend_tags=${BACKEND_TAGS}" >> $GITHUB_OUTPUT
          echo "frontend_tags=${FRONTEND_TAGS}" >> $GITHUB_OUTPUT
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          file: ./app/backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          file: ./app/frontend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.frontend_tags }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - name: Start services
        run: |
          docker compose up -d --build
          sleep 15
      - name: Health checks
        run: |
          curl -f http://localhost:3000/health || (docker compose logs backend && exit 1)
          curl -f http://localhost:80 || curl -f http://localhost:5173 || (docker compose logs frontend && exit 1)
      - name: API integration tests
        run: |
          HEALTH=$(curl -s http://localhost:3000/health)
          echo "$HEALTH" | jq -e '.ok == true' || exit 1
      - name: Cleanup
        if: always()
        run: docker compose down -v

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, docker-build, integration-tests]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Backend checks: ${{ needs.backend-checks.result }}"
          echo "Frontend checks: ${{ needs.frontend-checks.result }}"
          echo "Integration tests: ${{ needs.integration-tests.result }}"
          echo "Docker build: ${{ needs.docker-build.result }}"
          if [ "${{ needs.backend-checks.result }}" != "success" ] || \
             [ "${{ needs.frontend-checks.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "CI Failed!"
            exit 1
          fi
          # Docker build only runs on main/tags, so skipped is acceptable
          if [ "${{ needs.docker-build.result }}" == "failure" ]; then
            echo "Docker build failed!"
            exit 1
          fi
